name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: data hygiene + fixture eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pyyaml

      - name: Check train/eval JSONL
        run: python scripts/check_data.py

      - name: Score fixture predictions
        run: |
          python -m utils.eval \
            --predictions tests/fixtures/eval_predictions.jsonl \
            --out /tmp/metrics.json
          python - <<'PY'
          import json
          m = json.load(open("/tmp/metrics.json"))
          assert m["n"] == 3, m
          assert abs(m["exact_match"] - 2 / 3) < 1e-9, m
          print("fixture exact_match OK:", m["exact_match"])
          PY

  dry-run:
    name: sft dry-run (CPU deps)
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU torch + requirements
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: SFT dry-run
        run: python scripts/01_sft.py --dry-run

  # Optional: enable when OPENAI_API_KEY is set on the repo.
  # Codex is an inspector — deterministic jobs above are the source of truth.
  codex:
    name: codex inspector (optional)
    runs-on: ubuntu-latest
    needs: hygiene
    if: ${{ vars.ENABLE_CODEX_CI == 'true' }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps for gates
        run: pip install pyyaml

      - name: Run Codex against SPEC/CLAUDE
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/ci-check.md
          safety-strategy: drop-sudo
          permission-profile: ":workspace"

project:
  name: polar-lab
  seed: 42
  output_dir: outputs
device: auto
dtype: auto
model:
  name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  max_seq_length: 512
  trust_remote_code: true
lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
  - q_proj
  - v_proj
  bias: none
data:
  sft_train: data/cafe/sft_train.jsonl
  sft_eval: data/cafe/sft_eval.jsonl
  dpo_train: data/dpo_train.jsonl
  rl_prompts: data/rl_prompts.jsonl
  domain: cafe-semis
sft:
  enabled: true
  num_train_epochs: 12
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  warmup_ratio: 0.03
  max_steps: 360
  packing: false
dpo:
  enabled: false
eval:
  max_new_tokens: 64
  temperature: 0.0
  top_p: 1.0
  reports_dir: outputs/eval
wandb:
  enabled: false
  project: polar-lab
